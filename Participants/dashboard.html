<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevMatch Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
  <h1>DevMatch Dashboard</h1>

  <div class="cards">

    <div class="card" onclick="goToProfile()">
      <h3>Create Profile</h3>
      <p>Setup your participant profile</p>
    </div>

    <div class="card">
      <h3>Find Hackathons</h3>
      <p>Search hackathons by name</p>
    </div>

    <div class="card">
      <h3>Build Team</h3>
      <p>Create or auto-match teams</p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
