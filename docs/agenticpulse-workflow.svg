<svg width="1800" height="1120" viewBox="0 0 1800 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px Inter, Arial, sans-serif; fill: #0F172A; }
      .label { font: 600 15px Inter, Arial, sans-serif; fill: #0F172A; }
      .small { font: 400 13px Inter, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Arial, sans-serif; fill: #64748B; letter-spacing: 0.08em; text-transform: uppercase; }
      .box { fill: white; stroke: #D9E2EC; stroke-width: 1.5; rx: 24; filter: url(#shadow); }
      .dark { fill: #111111; stroke: #1F2937; stroke-width: 1.5; rx: 24; filter: url(#shadow); }
      .darkText { font: 600 15px Inter, Arial, sans-serif; fill: #F8FAFC; }
      .darkSmall { font: 400 13px Inter, Arial, sans-serif; fill: #CBD5E1; }
      .green { fill: #ECFDF3; stroke: #86EFAC; stroke-width: 1.5; rx: 20; }
      .red { fill: #FEF2F2; stroke: #FCA5A5; stroke-width: 1.5; rx: 20; }
      .blue { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.5; rx: 20; }
      .amber { fill: #FFFBEB; stroke: #FCD34D; stroke-width: 1.5; rx: 20; }
      .line { stroke: #94A3B8; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .lineBold { stroke: #22C55E; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { marker-end: url(#arrowHead); }
      .arrowGreen { marker-end: url(#arrowHeadGreen); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#22C55E"/>
    </marker>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>

  <text x="70" y="72" class="title">AgenticPulse Product Workflow</text>
  <text x="70" y="104" class="subtitle">End-to-end flow across signals, AI analysis, queues, workers, inspections, code intelligence, and product surfaces.</text>

  <rect x="60" y="150" width="270" height="190" class="box"/>
  <text x="86" y="182" class="tiny">Entry Points</text>
  <text x="86" y="220" class="label">Users + Teams</text>
  <text x="86" y="248" class="small">Open dashboard, connect sources, inspect product,</text>
  <text x="86" y="270" class="small">review issues, analyze code, create fixes and PRs.</text>
  <rect x="84" y="290" width="102" height="30" rx="15" fill="#ECFDF3" stroke="#86EFAC"/>
  <text x="108" y="309" class="small" fill="#166534">Control Room</text>
  <rect x="194" y="290" width="114" height="30" rx="15" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="221" y="309" class="small" fill="#1D4ED8">GitHub AI</text>

  <rect x="390" y="150" width="360" height="270" class="box"/>
  <text x="416" y="182" class="tiny">Signals In</text>
  <rect x="416" y="206" width="146" height="66" class="green"/>
  <text x="438" y="232" class="label">SDK Events</text>
  <text x="438" y="254" class="small">Behavior, errors, rage clicks,</text>
  <text x="438" y="274" class="small">feedback prompts</text>
  <rect x="578" y="206" width="146" height="66" class="blue"/>
  <text x="600" y="232" class="label">GitHub Repo</text>
  <text x="600" y="254" class="small">Files, structure, patches,</text>
  <text x="600" y="274" class="small">pull requests</text>
  <rect x="416" y="292" width="146" height="66" class="amber"/>
  <text x="438" y="318" class="label">Channels</text>
  <text x="438" y="340" class="small">Gmail, Outlook, IMAP,</text>
  <text x="438" y="360" class="small">calendar, reminders</text>
  <rect x="578" y="292" width="146" height="66" class="red"/>
  <text x="600" y="318" class="label">Public Signals</text>
  <text x="600" y="340" class="small">Reddit, social search,</text>
  <text x="600" y="360" class="small">reviews, app stores</text>

  <rect x="810" y="150" width="300" height="270" class="dark"/>
  <text x="836" y="182" class="tiny" fill="#94A3B8">Platform Core</text>
  <text x="836" y="222" class="darkText">Frontend + Backend</text>
  <text x="836" y="248" class="darkSmall">Next.js product shell + Express API</text>
  <rect x="836" y="276" width="248" height="48" rx="18" fill="#052E16" stroke="#22C55E"/>
  <text x="864" y="304" class="darkText">Event-driven ingestion layer</text>
  <rect x="836" y="338" width="248" height="52" rx="18" fill="#1E293B" stroke="#334155"/>
  <text x="864" y="366" class="darkText">Queues + orchestration</text>
  <text x="864" y="385" class="darkSmall">BullMQ + Upstash Redis</text>

  <rect x="1170" y="150" width="280" height="270" class="box"/>
  <text x="1196" y="182" class="tiny">Workers</text>
  <rect x="1196" y="210" width="228" height="42" class="green"/>
  <text x="1222" y="236" class="label">Event Worker</text>
  <rect x="1196" y="262" width="228" height="42" class="green"/>
  <text x="1222" y="288" class="label">SDK Events Worker</text>
  <rect x="1196" y="314" width="228" height="42" class="green"/>
  <text x="1222" y="340" class="label">Inspection Worker</text>
  <rect x="1196" y="366" width="228" height="42" class="green"/>
  <text x="1222" y="392" class="label">Code Analysis + Self-Heal</text>

  <rect x="60" y="470" width="470" height="250" class="box"/>
  <text x="86" y="502" class="tiny">Intelligence Layer</text>
  <rect x="86" y="528" width="136" height="58" class="blue"/>
  <text x="108" y="553" class="label">AST Analysis</text>
  <text x="108" y="573" class="small">Fast structural checks</text>
  <rect x="236" y="528" width="136" height="58" class="amber"/>
  <text x="260" y="553" class="label">Groq Reasoning</text>
  <text x="260" y="573" class="small">Bugs, fixes, explanations</text>
  <rect x="386" y="528" width="118" height="58" class="green"/>
  <text x="410" y="553" class="label">Clustering</text>
  <text x="410" y="573" class="small">Signal grouping</text>
  <rect x="86" y="608" width="180" height="78" class="red"/>
  <text x="110" y="634" class="label">Issue Intelligence</text>
  <text x="110" y="656" class="small">Severity, confidence,</text>
  <text x="110" y="676" class="small">critical radar, patterns</text>
  <rect x="284" y="608" width="220" height="78" class="green"/>
  <text x="308" y="634" class="label">Patch + PR Engine</text>
  <text x="308" y="656" class="small">Diff generation, validation,</text>
  <text x="308" y="676" class="small">PR creation, self-heal retries</text>

  <rect x="590" y="470" width="420" height="250" class="box"/>
  <text x="616" y="502" class="tiny">Inspection + Validation</text>
  <rect x="616" y="528" width="178" height="66" class="green"/>
  <text x="640" y="554" class="label">Website Inspection</text>
  <text x="640" y="576" class="small">Playwright worker runs</text>
  <rect x="810" y="528" width="174" height="66" class="green"/>
  <text x="834" y="554" class="label">Mobile Inspection</text>
  <text x="834" y="576" class="small">Cloud device validation</text>
  <rect x="616" y="612" width="368" height="74" class="blue"/>
  <text x="640" y="638" class="label">Tests + Repo Checks</text>
  <text x="640" y="660" class="small">Generated tests, lint, build, sandbox validation, self-healing retry loop.</text>

  <rect x="1070" y="470" width="680" height="250" class="box"/>
  <text x="1096" y="502" class="tiny">Product Surfaces</text>
  <rect x="1096" y="528" width="146" height="52" class="green"/>
  <text x="1122" y="559" class="label">Control Room</text>
  <rect x="1256" y="528" width="160" height="52" class="green"/>
  <text x="1282" y="559" class="label">Command Center</text>
  <rect x="1430" y="528" width="146" height="52" class="green"/>
  <text x="1456" y="559" class="label">Timeline</text>
  <rect x="1590" y="528" width="134" height="52" class="green"/>
  <text x="1618" y="559" class="label">Workspace</text>
  <rect x="1096" y="596" width="146" height="52" class="blue"/>
  <text x="1122" y="627" class="label">GitHub</text>
  <rect x="1256" y="596" width="160" height="52" class="blue"/>
  <text x="1278" y="627" class="label">Code Analysis</text>
  <rect x="1430" y="596" width="146" height="52" class="blue"/>
  <text x="1454" y="627" class="label">Multi-File</text>
  <rect x="1590" y="596" width="134" height="52" class="blue"/>
  <text x="1620" y="627" class="label">Graph AI</text>
  <rect x="1096" y="664" width="146" height="40" class="amber"/>
  <text x="1124" y="689" class="small">Settings</text>
  <rect x="1256" y="664" width="160" height="40" class="amber"/>
  <text x="1282" y="689" class="small">Integrations</text>
  <rect x="1430" y="664" width="146" height="40" class="amber"/>
  <text x="1454" y="689" class="small">SDK</text>
  <rect x="1590" y="664" width="134" height="40" class="amber"/>
  <text x="1620" y="689" class="small">Inspections</text>

  <rect x="180" y="780" width="1420" height="210" class="dark"/>
  <text x="210" y="816" class="tiny" fill="#94A3B8">Data + Outcomes</text>
  <rect x="212" y="842" width="250" height="96" rx="20" fill="#0F172A" stroke="#334155"/>
  <text x="238" y="872" class="darkText">Supabase</text>
  <text x="238" y="896" class="darkSmall">Users, issues, tickets, reminders,</text>
  <text x="238" y="916" class="darkSmall">settings, collaboration, analytics</text>
  <rect x="492" y="842" width="250" height="96" rx="20" fill="#3F0D12" stroke="#7F1D1D"/>
  <text x="518" y="872" class="darkText">Upstash Redis</text>
  <text x="518" y="896" class="darkSmall">BullMQ queues, job state,</text>
  <text x="518" y="916" class="darkSmall">async processing backbone</text>
  <rect x="772" y="842" width="250" height="96" rx="20" fill="#052E16" stroke="#166534"/>
  <text x="798" y="872" class="darkText">GitHub</text>
  <text x="798" y="896" class="darkSmall">Branches, commits, pull requests,</text>
  <text x="798" y="916" class="darkSmall">repo structure and source files</text>
  <rect x="1052" y="842" width="250" height="96" rx="20" fill="#1E293B" stroke="#334155"/>
  <text x="1078" y="872" class="darkText">AI Guidance</text>
  <text x="1078" y="896" class="darkSmall">Root cause, patch explanation,</text>
  <text x="1078" y="916" class="darkSmall">graph navigation, remediation</text>
  <rect x="1332" y="842" width="238" height="96" rx="20" fill="#1F2937" stroke="#374151"/>
  <text x="1358" y="872" class="darkText">User Decisions</text>
  <text x="1358" y="896" class="darkSmall">Resolve issues, approve fixes,</text>
  <text x="1358" y="916" class="darkSmall">run tests, ship with confidence</text>

