<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What skills are you looking for? - DevMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --bg: #0a0b0f;
            --card: #12141a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 860px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 44px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .header p {
            color: #888;
            font-size: 18px;
        }

        .progress-bar {
            height: 6px;
            background: #1f2229;
            border-radius: 999px;
            margin-bottom: 50px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, var(--primary), #00cc7a);
            border-radius: 999px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 18px;
            margin-bottom: 60px;
        }

        .skill-card {
            background: var(--card);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.35s ease;
            user-select: none;
        }

        .skill-card:hover {
            border-color: #444;
            transform: translateY(-6px);
        }

        .skill-card.selected {
            border-color: var(--primary);
            background: rgba(0, 255, 157, 0.09);
            color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.25);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .selected-info {
            color: #aaa;
            font-size: 16px;
        }

        .continue-btn {
            padding: 18px 52px;
            background: linear-gradient(90deg, #00ff9d, #00e68a);
            color: #000;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .continue-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .continue-btn:hover:not(:disabled) {
            transform: scale(1.06);
            box-shadow: 0 20px 40px rgba(0, 255, 157, 0.35);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>What skills are you looking for?</h1>
            <p>Select all that apply to find the best matching hackathons</p>
        </div>

        <!-- Progress -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Skills Grid -->
        <div class="skills-grid" id="skills-grid"></div>

        <!-- Footer -->
        <div class="footer">
            <div class="selected-info" id="selected-info">0 skills selected</div>
            <button class="continue-btn" id="continue-btn" disabled onclick="continueToProfile()">
                Continue →
            </button>
        </div>
    </div>

    <script>
        const skillsList = [
            "AI/ML", "Frontend", "Backend", "Blockchain",
            "UI/UX", "Mobile", "DevOps", "Cloud",
            "AR/VR", "GameDev", "Sustainability", "Data Science",
            "Cybersecurity", "Machine Learning", "Full Stack", "Product Design",
            "Web3", "IoT", "Embedded Systems", "Competitive Programming"
        ];

        const grid = document.getElementById('skills-grid');
        const selectedInfo = document.getElementById('selected-info');
        const continueBtn = document.getElementById('continue-btn');

        let selectedSkills = [];

        // Create skill cards
        skillsList.forEach(skill => {
            const card = document.createElement('div');
            card.className = 'skill-card';
            card.textContent = skill;

            card.addEventListener('click', () => {
                if (selectedSkills.includes(skill)) {
                    selectedSkills = selectedSkills.filter(s => s !== skill);
                    card.classList.remove('selected');
                } else {
                    selectedSkills.push(skill);
                    card.classList.add('selected');
                }
                updateFooter();
            });

            grid.appendChild(card);
        });

        function updateFooter() {
            selectedInfo.textContent = `${selectedSkills.length} skill${selectedSkills.length !== 1 ? 's' : ''} selected`;
            continueBtn.disabled = selectedSkills.length === 0;
        }

        function continueToProfile() {
            if (selectedSkills.length === 0) return;

            // Save selected skills
            localStorage.setItem('userSkills', JSON.stringify(selectedSkills));

            // Redirect to organizer profile
            window.location.href = "organizer-profile.html";
        }

        // Allow pressing Enter to continue
        document.addEventListener('keydown', (e) => {
            if (e.key === "Enter" && !continueBtn.disabled) {
                continueToProfile();
            }
        });
    </script>
</body>
</html>
